<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    UML 包图模板
    展示包+依赖/导入关系
  -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-dep" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- 包1: com.app.ui（包=tab头+主体） -->
  <rect x="40" y="58" width="80" height="20" rx="4" ry="4"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="80" y="72" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT_COLOR}}">«package»</text>
  <rect x="40" y="78" width="240" height="140" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="105" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}">{{PKG_1}}</text>
  <!-- 包内元素 -->
  <rect x="60" y="118" width="90" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="105" y="138" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">MainView</text>
  <rect x="170" y="118" width="90" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="215" y="138" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">Router</text>
  <rect x="60" y="160" width="90" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="105" y="180" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">Theme</text>

  <!-- 包2: com.app.service -->
  <rect x="340" y="58" width="80" height="20" rx="4" ry="4"
        fill="{{ACCENT2_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT2_COLOR}}">«package»</text>
  <rect x="340" y="78" width="240" height="140" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="105" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}">{{PKG_2}}</text>
  <rect x="360" y="118" width="100" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="410" y="138" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">OrderService</text>
  <rect x="470" y="118" width="90" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="515" y="138" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">UserService</text>
  <rect x="360" y="160" width="100" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="410" y="180" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">AuthService</text>

  <!-- 包3: com.app.data -->
  <rect x="340" y="278" width="80" height="20" rx="4" ry="4"
        fill="{{ACCENT3_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="380" y="292" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT3_COLOR}}">«package»</text>
  <rect x="340" y="298" width="240" height="120" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="325" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}">{{PKG_3}}</text>
  <rect x="360" y="340" width="100" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="410" y="360" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">Repository</text>
  <rect x="470" y="340" width="90" height="30" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="515" y="360" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">Entity</text>

  <!-- 包4: com.app.util -->
  <rect x="660" y="148" width="80" height="20" rx="4" ry="4"
        fill="{{BORDER_COLOR}}" fill-opacity="0.2" stroke="{{BORDER_COLOR}}" stroke-width="1.5"/>
  <text x="700" y="162" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">«package»</text>
  <rect x="660" y="168" width="200" height="100" rx="4"
        fill="{{NODE_FILL}}" stroke="{{BORDER_COLOR}}" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="760" y="195" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}">{{PKG_4}}</text>
  <rect x="680" y="210" width="80" height="28" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="720" y="228" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">Logger</text>
  <rect x="770" y="210" width="70" height="28" rx="4"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="805" y="228" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">Config</text>

  <!-- 依赖关系 -->
  <!-- ui → service -->
  <line x1="282" y1="140" x2="338" y2="140" stroke="{{ARROW_COLOR}}" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#arrow-dep)"/>
  <text x="310" y="132" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">«import»</text>

  <!-- service → data -->
  <line x1="460" y1="220" x2="460" y2="296" stroke="{{ARROW_COLOR}}" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#arrow-dep)"/>
  <text x="475" y="262" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">«access»</text>

  <!-- service → util -->
  <line x1="582" y1="148" x2="658" y2="198" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrow-dep)"/>
  <text x="630" y="165" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">«import»</text>

  <!-- ui → util -->
  <line x1="280" y1="200" x2="658" y2="225" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrow-dep)"/>

  <!-- 图例 -->
  <rect x="40" y="400" width="290" height="85" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="55" y="420" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TITLE_COLOR}}">图例 Legend</text>
  <rect x="55" y="430" width="30" height="8" rx="3" fill="{{ACCENT_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <rect x="55" y="438" width="30" height="20" rx="2" fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <text x="95" y="453" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">包 Package</text>
  <line x1="165" y1="445" x2="215" y2="445" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrow-dep)"/>
  <text x="225" y="449" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">依赖/导入</text>
  <rect x="55" y="465" width="30" height="12" rx="2" fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="95" y="477" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">包内元素</text>
</svg>
