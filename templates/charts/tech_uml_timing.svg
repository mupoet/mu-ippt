<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    UML 时间图模板
    展示生命线+状态时间轴+时间约束+消息
  -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 外框 -->
  <rect x="30" y="10" width="840" height="480" rx="6"
        fill="none" stroke="{{NODE_STROKE}}" stroke-width="2"/>
  <polygon points="30,10 200,10 215,30 30,30" fill="{{ACCENT_COLOR}}" fill-opacity="0.15"
           stroke="{{NODE_STROKE}}" stroke-width="1.5"/>
  <text x="110" y="24" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">sd {{TITLE}}</text>

  <!-- 时间轴刻度（底部） -->
  <line x1="180" y1="460" x2="830" y2="460" stroke="{{BORDER_COLOR}}" stroke-width="1.5"/>
  <text x="830" y="475" text-anchor="end" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{SUBTITLE_COLOR}}">time →</text>
  <!-- 刻度线 -->
  <line x1="200" y1="455" x2="200" y2="465" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="200" y="478" text-anchor="middle" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">t0</text>
  <line x1="330" y1="455" x2="330" y2="465" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="330" y="478" text-anchor="middle" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">t1</text>
  <line x1="460" y1="455" x2="460" y2="465" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="460" y="478" text-anchor="middle" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">t2</text>
  <line x1="590" y1="455" x2="590" y2="465" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="590" y="478" text-anchor="middle" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">t3</text>
  <line x1="720" y1="455" x2="720" y2="465" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="720" y="478" text-anchor="middle" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">t4</text>

  <!-- 生命线1 标签 -->
  <rect x="40" y="55" width="130" height="35" rx="4"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.12" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="105" y="77" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{LIFELINE_1}}</text>

  <!-- 生命线1 状态标签（左侧） -->
  <text x="175" y="108" text-anchor="end" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT_COLOR}}">Active</text>
  <text x="175" y="148" text-anchor="end" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{SUBTITLE_COLOR}}">Idle</text>
  <text x="175" y="188" text-anchor="end" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT2_COLOR}}">Waiting</text>

  <!-- 生命线1 状态波形 -->
  <polyline points="200,100 330,100 330,140 460,140 460,100 590,100 590,180 720,180 720,100 800,100"
            fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="2.5"/>
  <!-- 水平参考线 -->
  <line x1="200" y1="100" x2="200" y2="100" stroke="{{BORDER_COLOR}}" stroke-width="0.5"/>
  <line x1="180" y1="140" x2="800" y2="140" stroke="{{BORDER_COLOR}}" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="180" y1="180" x2="800" y2="180" stroke="{{BORDER_COLOR}}" stroke-width="0.3" stroke-dasharray="3,3"/>

  <!-- 分隔线 -->
  <line x1="40" y1="215" x2="860" y2="215" stroke="{{BORDER_COLOR}}" stroke-width="1"/>

  <!-- 生命线2 标签 -->
  <rect x="40" y="230" width="130" height="35" rx="4"
        fill="{{ACCENT2_COLOR}}" fill-opacity="0.12" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="105" y="252" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{LIFELINE_2}}</text>

  <!-- 生命线2 状态标签 -->
  <text x="175" y="288" text-anchor="end" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT2_COLOR}}">Running</text>
  <text x="175" y="328" text-anchor="end" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{SUBTITLE_COLOR}}">Stopped</text>
  <text x="175" y="368" text-anchor="end" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT3_COLOR}}">Error</text>

  <!-- 生命线2 状态波形 -->
  <polyline points="200,320 330,320 330,280 460,280 460,360 590,360 590,280 720,280 720,320 800,320"
            fill="none" stroke="{{ACCENT2_COLOR}}" stroke-width="2.5"/>
  <!-- 水平参考线 -->
  <line x1="180" y1="280" x2="800" y2="280" stroke="{{BORDER_COLOR}}" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="180" y1="320" x2="800" y2="320" stroke="{{BORDER_COLOR}}" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="180" y1="360" x2="800" y2="360" stroke="{{BORDER_COLOR}}" stroke-width="0.3" stroke-dasharray="3,3"/>

  <!-- 消息: Lifeline1 → Lifeline2 at t1 -->
  <line x1="330" y1="100" x2="330" y2="318" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="340" y="210" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT_COLOR}}">{{MSG_1}}</text>

  <!-- 消息: Lifeline2 → Lifeline1 at t2 -->
  <line x1="460" y1="280" x2="460" y2="142" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="470" y="210" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT2_COLOR}}">{{MSG_2}}</text>

  <!-- 时间约束 -->
  <line x1="330" y1="420" x2="460" y2="420" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <line x1="330" y1="415" x2="330" y2="425" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <line x1="460" y1="415" x2="460" y2="425" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="395" y="414" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" font-weight="bold" fill="{{ACCENT3_COLOR}}">{{CONSTRAINT_1}}</text>

  <line x1="590" y1="420" x2="720" y2="420" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <line x1="590" y1="415" x2="590" y2="425" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <line x1="720" y1="415" x2="720" y2="425" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="655" y="414" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" font-weight="bold" fill="{{ACCENT3_COLOR}}">{{CONSTRAINT_2}}</text>

  <!-- 图例 -->
  <rect x="40" y="395" width="130" height="60" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="55" y="412" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{TITLE_COLOR}}">图例</text>
  <line x1="50" y1="428" x2="80" y2="428" stroke="{{ACCENT_COLOR}}" stroke-width="2.5"/>
  <text x="88" y="432" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">状态</text>
  <line x1="50" y1="443" x2="80" y2="443" stroke="{{ARROW_COLOR}}" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="88" y="447" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">消息</text>
</svg>
