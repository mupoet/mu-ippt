<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    UML 通信图模板
    展示对象+编号消息+链接
  -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ACCENT2_COLOR}}"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- 对象1: :Client -->
  <rect x="50" y="80" width="180" height="60" rx="6"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="115" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_1}}</text>

  <!-- 对象2: :Controller -->
  <rect x="360" y="80" width="180" height="60" rx="6"
        fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="115" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_2}}</text>

  <!-- 对象3: :Service -->
  <rect x="660" y="180" width="180" height="60" rx="6"
        fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="215" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_3}}</text>

  <!-- 对象4: :Repository -->
  <rect x="660" y="330" width="180" height="60" rx="6"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="365" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_4}}</text>

  <!-- 对象5: :Database -->
  <rect x="360" y="330" width="180" height="60" rx="6"
        fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="365" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_5}}</text>

  <!-- 链接 + 编号消息 -->
  <!-- 1: Client → Controller -->
  <line x1="230" y1="105" x2="358" y2="105" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <line x1="280" y1="93" x2="330" y2="93" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="305" y="87" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{ACCENT_COLOR}}">1: request()</text>

  <!-- 2: Controller → Service -->
  <line x1="540" y1="120" x2="690" y2="180" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <line x1="580" y1="135" x2="630" y2="155" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="128" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{ACCENT_COLOR}}">2: process()</text>

  <!-- 3: Service → Repository -->
  <line x1="750" y1="240" x2="750" y2="328" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <line x1="740" y1="265" x2="740" y2="305" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="780" y="288" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{ACCENT_COLOR}}">3: find()</text>

  <!-- 4: Repository → Database -->
  <line x1="660" y1="360" x2="540" y2="360" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <line x1="630" y1="350" x2="580" y2="350" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="342" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{ACCENT_COLOR}}">4: query()</text>

  <!-- 返回消息 -->
  <!-- 4.1: Database → Repository -->
  <line x1="580" y1="375" x2="630" y2="375" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="600" y="392" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT2_COLOR}}">4.1: resultSet</text>

  <!-- 3.1: Repository → Service -->
  <line x1="760" y1="305" x2="760" y2="265" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="810" y="288" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT2_COLOR}}">3.1: data</text>

  <!-- 2.1: Service → Controller -->
  <line x1="630" y1="162" x2="580" y2="142" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="620" y="168" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT2_COLOR}}">2.1: result</text>

  <!-- 1.1: Controller → Client -->
  <line x1="330" y1="118" x2="280" y2="118" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="305" y="132" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT2_COLOR}}">1.1: response</text>

  <!-- 自关联: Service self-call -->
  <path d="M 840 200 Q 880 200 880 225 Q 880 250 840 250" fill="none" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="870" y="228" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT_COLOR}}">2.1: validate()</text>

  <!-- 图例 -->
  <rect x="50" y="420" width="300" height="70" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="65" y="440" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TITLE_COLOR}}">图例 Legend</text>
  <line x1="65" y1="458" x2="105" y2="458" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="115" y="462" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">编号消息 Numbered Msg</text>
  <line x1="65" y1="478" x2="105" y2="478" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="115" y="482" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">返回消息 Return</text>
</svg>
