<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    RAG 检索增强生成流程模板
    流程：Query → Embed → VectorSearch → Retrieve → LLM → Response
    占位符说明：
      {{BG_COLOR}}      — 背景色
      {{TEXT_COLOR}}     — 正文色
      {{TITLE_COLOR}}    — 标题色
      {{SUBTITLE_COLOR}} — 副标题色
      {{ACCENT_COLOR}}   — 主强调色
      {{ACCENT2_COLOR}}  — 次强调色
      {{ACCENT3_COLOR}}  — 第三强调色
      {{BORDER_COLOR}}   — 边框/分割色
      {{NODE_FILL}}      — 节点填充色
      {{NODE_STROKE}}    — 节点描边色
      {{ARROW_COLOR}}    — 箭头色
      {{FONT_FAMILY}}    — 字体

    语义形状：用户=圆形+身体路径，LLM=双边框圆角矩形⚡，
    Vector Store=带内环圆柱，文档=折角矩形
    LLM 生成时参考此结构，自由增减节点。
  -->

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ACCENT2_COLOR}}"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="38" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- ====== 主流程（上半部分）：Query → Embed → VectorSearch → Retrieve → LLM → Response ====== -->

  <!-- 用户（圆形 + 身体路径） -->
  <circle cx="60" cy="140" r="18" fill="{{ACCENT_COLOR}}" fill-opacity="0.15"
          stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <circle cx="60" cy="133" r="6" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <path d="M 48 149 Q 60 160 72 149" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="60" y="175" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{SUBTITLE_COLOR}}">{{USER_LABEL}}</text>

  <!-- Query 箭头 -->
  <line x1="80" y1="140" x2="118" y2="140" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="99" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT_COLOR}}">Query</text>

  <!-- Step 1: Embed（带 ⚙ 的矩形 = 工具/函数） -->
  <rect x="120" y="118" width="110" height="44" rx="6"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="137" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">⚙ {{STEP_1}}</text>
  <text x="175" y="153" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{STEP_1_DESC}}</text>

  <!-- Embed → Vector Search -->
  <line x1="230" y1="140" x2="268" y2="140" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="249" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{ACCENT_COLOR}}">vector</text>

  <!-- Step 2: Vector Search（带内环圆柱 = Vector Store） -->
  <ellipse cx="330" cy="118" rx="40" ry="10" fill="{{ACCENT2_COLOR}}" fill-opacity="0.2"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <rect x="290" y="118" width="80" height="44" fill="{{NODE_FILL}}"
        stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <ellipse cx="330" cy="162" rx="40" ry="10" fill="{{NODE_FILL}}"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <!-- 内环 -->
  <ellipse cx="330" cy="135" rx="22" ry="6" fill="none"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="152" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{STEP_2}}</text>
  <text x="330" y="185" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{STEP_2_DESC}}</text>

  <!-- Vector Search → Retrieve -->
  <line x1="370" y1="140" x2="408" y2="140" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="389" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{ACCENT_COLOR}}">top-k</text>

  <!-- Step 3: Retrieve（折角矩形 = 文档） -->
  <polygon points="410,118 500,118 510,128 510,162 410,162"
           fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <polygon points="500,118 500,128 510,128" fill="{{BORDER_COLOR}}" fill-opacity="0.3"
           stroke="{{NODE_STROKE}}" stroke-width="1"/>
  <text x="460" y="137" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{STEP_3}}</text>
  <text x="460" y="153" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{STEP_3_DESC}}</text>

  <!-- Retrieve → LLM -->
  <line x1="510" y1="140" x2="558" y2="140" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="534" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{ACCENT_COLOR}}">context</text>

  <!-- Step 4: LLM（双边框圆角矩形 + ⚡） -->
  <rect x="560" y="112" width="130" height="56" rx="12"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="565" y="117" width="120" height="46" rx="9"
        fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1" stroke-opacity="0.5"/>
  <text x="625" y="137" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">⚡ {{STEP_4}}</text>
  <text x="625" y="155" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{STEP_4_DESC}}</text>

  <!-- LLM → Response -->
  <line x1="690" y1="140" x2="728" y2="140" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="709" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{ACCENT_COLOR}}">answer</text>

  <!-- Response（圆角矩形，强调色） -->
  <rect x="730" y="118" width="120" height="44" rx="20"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="790" y="145" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{STEP_5}}</text>

  <!-- ====== 下半部分：文档索引流程（Indexing Pipeline） ====== -->

  <!-- 索引流程标签 -->
  <rect x="80" y="230" width="740" height="150" rx="10"
        fill="{{ACCENT3_COLOR}}" fill-opacity="0.05" stroke="{{BORDER_COLOR}}" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="450" y="252" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{ACCENT3_COLOR}}">{{INDEX_PIPELINE_LABEL}}</text>

  <!-- 文档源（折角矩形） -->
  <polygon points="110,270 200,270 210,280 210,330 110,330"
           fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="200,270 200,280 210,280" fill="{{BORDER_COLOR}}" fill-opacity="0.3"
           stroke="{{ACCENT3_COLOR}}" stroke-width="1"/>
  <text x="160" y="298" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{DOC_SOURCE}}</text>
  <text x="160" y="315" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{DOC_SOURCE_DESC}}</text>

  <!-- 文档 → Chunker -->
  <line x1="210" y1="300" x2="258" y2="300" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Chunker（工具矩形 ⚙） -->
  <rect x="260" y="278" width="110" height="44" rx="6"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="298" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">⚙ {{CHUNKER}}</text>
  <text x="315" y="314" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{CHUNKER_DESC}}</text>

  <!-- Chunker → Embedder -->
  <line x1="370" y1="300" x2="418" y2="300" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embedder（工具矩形 ⚙） -->
  <rect x="420" y="278" width="110" height="44" rx="6"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="475" y="298" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">⚙ {{EMBEDDER}}</text>
  <text x="475" y="314" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{EMBEDDER_DESC}}</text>

  <!-- Embedder → Vector Store (记忆写入：虚线) -->
  <line x1="530" y1="300" x2="578" y2="300" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <text x="554" y="293" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{ACCENT2_COLOR}}">write</text>

  <!-- Vector Store（带内环圆柱） -->
  <ellipse cx="640" cy="278" rx="40" ry="10" fill="{{ACCENT2_COLOR}}" fill-opacity="0.2"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <rect x="600" y="278" width="80" height="44" fill="{{NODE_FILL}}"
        stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <ellipse cx="640" cy="322" rx="40" ry="10" fill="{{NODE_FILL}}"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <ellipse cx="640" cy="295" rx="22" ry="6" fill="none"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="640" y="312" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{VECTOR_STORE}}</text>

  <!-- 向上虚线连接到查询阶段的 Vector Search -->
  <line x1="350" y1="162" x2="620" y2="278" stroke="{{BORDER_COLOR}}" stroke-width="1"
        stroke-dasharray="4,3"/>
  <text x="500" y="215" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{SUBTITLE_COLOR}}">shared index</text>

  <!-- ====== 可选元素：Metadata Store ====== -->
  <rect x="720" y="278" width="90" height="44" rx="6"
        fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="765" y="298" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{TEXT_COLOR}}">{{METADATA}}</text>
  <text x="765" y="314" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{METADATA_DESC}}</text>

  <line x1="680" y1="300" x2="718" y2="300" stroke="{{ARROW_COLOR}}" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ====== 图例 ====== -->
  <rect x="20" y="400" width="280" height="85" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="35" y="418" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{TITLE_COLOR}}">图例 Legend</text>

  <!-- 用户 -->
  <circle cx="35" cy="436" r="5" fill="{{ACCENT_COLOR}}" fill-opacity="0.3"
          stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <text x="48" y="440" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">用户 User</text>

  <!-- LLM -->
  <rect x="115" y="430" width="22" height="12" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <rect x="117" y="432" width="18" height="8" rx="3" fill="none"
        stroke="{{ACCENT_COLOR}}" stroke-width="0.5"/>
  <text x="145" y="440" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">LLM 模型</text>

  <!-- Vector Store -->
  <ellipse cx="225" cy="434" rx="12" ry="4" fill="none"
           stroke="{{ACCENT2_COLOR}}" stroke-width="1"/>
  <text x="245" y="440" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">Vector DB</text>

  <!-- 主数据流 -->
  <line x1="28" y1="460" x2="58" y2="460" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="68" y="464" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">主数据流</text>

  <!-- 记忆写入 -->
  <line x1="148" y1="460" x2="178" y2="460" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <text x="188" y="464" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">写入/索引</text>
</svg>
