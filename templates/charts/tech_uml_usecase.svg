<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    UML 用例图模板
    展示参与者(Actor)+用例(UseCase)+系统边界+关系
  -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
    <marker id="arrow-ext" markerWidth="14" markerHeight="10" refX="14" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="{{BG_COLOR}}" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="32" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- 系统边界框 -->
  <rect x="220" y="50" width="460" height="400" rx="10"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="75" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}">{{SYSTEM_NAME}}</text>

  <!-- Actor 1（火柴人）: Customer -->
  <circle cx="80" cy="120" r="15" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <line x1="80" y1="135" x2="80" y2="180" stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <line x1="55" y1="155" x2="105" y2="155" stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <line x1="80" y1="180" x2="55" y2="210" stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <line x1="80" y1="180" x2="105" y2="210" stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <text x="80" y="230" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{ACTOR_1}}</text>

  <!-- Actor 2（火柴人）: Admin -->
  <circle cx="80" cy="330" r="15" fill="none" stroke="{{ACCENT2_COLOR}}" stroke-width="2"/>
  <line x1="80" y1="345" x2="80" y2="390" stroke="{{ACCENT2_COLOR}}" stroke-width="2"/>
  <line x1="55" y1="365" x2="105" y2="365" stroke="{{ACCENT2_COLOR}}" stroke-width="2"/>
  <line x1="80" y1="390" x2="55" y2="420" stroke="{{ACCENT2_COLOR}}" stroke-width="2"/>
  <line x1="80" y1="390" x2="105" y2="420" stroke="{{ACCENT2_COLOR}}" stroke-width="2"/>
  <text x="80" y="440" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{ACTOR_2}}</text>

  <!-- Actor 3（外部系统）: PaymentGW -->
  <rect x="770" y="160" width="110" height="50" rx="6"
        fill="{{ACCENT3_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="825" y="180" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT3_COLOR}}">«actor»</text>
  <text x="825" y="198" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{ACTOR_3}}</text>

  <!-- 用例1: Browse Products -->
  <ellipse cx="370" cy="120" rx="110" ry="30"
           fill="{{BG_COLOR}}" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="370" y="125" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{TEXT_COLOR}}">{{UC_1}}</text>

  <!-- 用例2: Place Order -->
  <ellipse cx="370" cy="200" rx="110" ry="30"
           fill="{{BG_COLOR}}" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="370" y="205" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{TEXT_COLOR}}">{{UC_2}}</text>

  <!-- 用例3: Make Payment (include) -->
  <ellipse cx="560" cy="200" rx="95" ry="28"
           fill="{{BG_COLOR}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="560" y="205" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{TEXT_COLOR}}">{{UC_3}}</text>

  <!-- 用例4: View Reports -->
  <ellipse cx="370" cy="310" rx="110" ry="30"
           fill="{{BG_COLOR}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="370" y="315" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{TEXT_COLOR}}">{{UC_4}}</text>

  <!-- 用例5: Manage Users -->
  <ellipse cx="370" cy="390" rx="110" ry="30"
           fill="{{BG_COLOR}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="370" y="395" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{TEXT_COLOR}}">{{UC_5}}</text>

  <!-- 用例6: Login (extend) -->
  <ellipse cx="560" cy="310" rx="95" ry="28"
           fill="{{BG_COLOR}}" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="560" y="315" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{TEXT_COLOR}}">{{UC_6}}</text>

  <!-- 关联: Actor1 → UC1 -->
  <line x1="105" y1="150" x2="262" y2="125" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>
  <!-- 关联: Actor1 → UC2 -->
  <line x1="105" y1="170" x2="262" y2="200" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>
  <!-- 关联: Actor2 → UC4 -->
  <line x1="105" y1="365" x2="262" y2="320" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>
  <!-- 关联: Actor2 → UC5 -->
  <line x1="105" y1="390" x2="262" y2="390" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>

  <!-- include: UC2 ─ ─ ▶ UC3 -->
  <line x1="478" y1="195" x2="467" y2="195" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <line x1="467" y1="195" x2="467" y2="200" stroke="none"/>
  <line x1="478" y1="200" x2="540" y2="200" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4"/>
  <!-- redraw cleaner -->
  <line x1="480" y1="198" x2="544" y2="198" stroke="{{ARROW_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="512" y="190" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">«include»</text>

  <!-- extend: UC6 ─ ─ ▶ UC4 -->
  <line x1="468" y1="310" x2="544" y2="310" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="506" y="302" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">«extend»</text>

  <!-- Actor3 → UC3 -->
  <line x1="770" y1="190" x2="654" y2="198" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>

  <!-- 图例 -->
  <rect x="700" y="370" width="185" height="115" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="715" y="390" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TITLE_COLOR}}">图例 Legend</text>
  <ellipse cx="730" cy="410" rx="15" ry="8" fill="{{BG_COLOR}}" stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <text x="755" y="414" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">用例 Use Case</text>
  <line x1="715" y1="430" x2="745" y2="430" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>
  <text x="755" y="434" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">关联 Association</text>
  <line x1="715" y1="450" x2="745" y2="450" stroke="{{ARROW_COLOR}}" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="755" y="454" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">include / extend</text>
  <circle cx="722" cy="470" r="6" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <line x1="722" y1="470" x2="722" y2="476" stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <text x="755" y="474" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">参与者 Actor</text>
</svg>
