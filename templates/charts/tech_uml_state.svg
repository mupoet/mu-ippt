<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    UML 状态机图模板
    展示状态+转换+初始/终止状态+复合状态
  -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- 初始状态（实心圆） -->
  <circle cx="100" cy="80" r="10" fill="{{ACCENT_COLOR}}"/>

  <!-- 状态1: Idle -->
  <rect x="50" y="120" width="160" height="70" rx="20"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="150" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{STATE_1}}</text>
  <line x1="50" y1="160" x2="210" y2="160" stroke="{{BORDER_COLOR}}" stroke-width="0.8"/>
  <text x="65" y="178" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{SUBTITLE_COLOR}}">entry / initialize()</text>

  <!-- 初始→状态1 -->
  <line x1="100" y1="90" x2="110" y2="118" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 复合状态框: Processing -->
  <rect x="280" y="70" width="380" height="250" rx="20"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.05" stroke="{{ACCENT2_COLOR}}" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="470" y="92" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{ACCENT2_COLOR}}">{{COMPOSITE_STATE}}</text>

  <!-- 子状态 初始 -->
  <circle cx="320" cy="130" r="7" fill="{{ACCENT2_COLOR}}"/>

  <!-- 子状态1: Validating -->
  <rect x="350" y="110" width="140" height="55" rx="16"
        fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="420" y="135" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{SUBSTATE_1}}</text>
  <line x1="350" y1="143" x2="490" y2="143" stroke="{{BORDER_COLOR}}" stroke-width="0.6"/>
  <text x="360" y="157" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">do / validate()</text>

  <!-- 子初始→子状态1 -->
  <line x1="327" y1="130" x2="348" y2="130" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 子状态2: Executing -->
  <rect x="350" y="200" width="140" height="55" rx="16"
        fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="420" y="225" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{SUBSTATE_2}}</text>
  <line x1="350" y1="233" x2="490" y2="233" stroke="{{BORDER_COLOR}}" stroke-width="0.6"/>
  <text x="360" y="248" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{SUBTITLE_COLOR}}">do / execute()</text>

  <!-- 子状态1→子状态2 -->
  <line x1="420" y1="165" x2="420" y2="198" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="435" y="185" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{ACCENT_COLOR}}">[valid]</text>

  <!-- 子状态3: Saving -->
  <rect x="530" y="150" width="110" height="50" rx="16"
        fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="585" y="180" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{SUBSTATE_3}}</text>

  <!-- 子状态2→子状态3 -->
  <line x1="490" y1="220" x2="528" y2="190" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 状态1 → 复合状态 -->
  <line x1="210" y1="150" x2="278" y2="150" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="244" y="142" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT_COLOR}}">start()</text>

  <!-- 状态3: Completed -->
  <rect x="350" y="370" width="160" height="60" rx="20"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="397" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{STATE_2}}</text>
  <line x1="350" y1="405" x2="510" y2="405" stroke="{{BORDER_COLOR}}" stroke-width="0.8"/>
  <text x="365" y="420" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{SUBTITLE_COLOR}}">entry / notify()</text>

  <!-- 复合状态 → 状态3 -->
  <line x1="470" y1="320" x2="440" y2="368" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="475" y="348" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT_COLOR}}">done()</text>

  <!-- 状态4: Error -->
  <rect x="700" y="370" width="150" height="60" rx="20"
        fill="{{ACCENT3_COLOR}}" fill-opacity="0.1" stroke="{{ACCENT3_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="405" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{STATE_3}}</text>

  <!-- 复合状态 → Error -->
  <line x1="660" y1="280" x2="740" y2="368" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="715" y="320" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT3_COLOR}}">error()</text>

  <!-- Error → Idle (recovery) -->
  <path d="M 700 400 Q 50 460 100 192" fill="none" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"
        stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="380" y="468" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{ACCENT3_COLOR}}">retry()</text>

  <!-- 终止状态 -->
  <circle cx="430" cy="470" r="10" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <circle cx="430" cy="470" r="6" fill="{{ACCENT_COLOR}}"/>

  <!-- 状态3 → 终止 -->
  <line x1="430" y1="430" x2="430" y2="458" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 图例 -->
  <rect x="20" y="340" width="200" height="110" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="35" y="358" font-family="{{FONT_FAMILY}}"
        font-size="10" font-weight="bold" fill="{{TITLE_COLOR}}">图例 Legend</text>
  <circle cx="35" cy="375" r="5" fill="{{ACCENT_COLOR}}"/>
  <text x="48" y="379" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">初始状态</text>
  <circle cx="120" cy="375" r="5" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <circle cx="120" cy="375" r="3" fill="{{ACCENT_COLOR}}"/>
  <text x="133" y="379" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">终止状态</text>
  <rect x="28" y="390" width="30" height="14" rx="7" fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <text x="68" y="401" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">简单状态</text>
  <rect x="28" y="412" width="30" height="14" rx="7" fill="{{ACCENT_COLOR}}" fill-opacity="0.05"
        stroke="{{ACCENT2_COLOR}}" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="68" y="423" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">复合状态</text>
  <line x1="28" y1="438" x2="58" y2="438" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="68" y="442" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{TEXT_COLOR}}">转换 Transition</text>
</svg>
