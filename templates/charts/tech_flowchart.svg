<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!--
    流程图 SVG 模板
    LLM 生成时参考此结构，自由增减步骤节点。
    开始/结束用圆角矩形(rx=20)，判断用菱形，步骤用矩形。
  -->

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- 开始节点 -->
  <rect x="325" y="50" width="150" height="40" rx="20"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.2" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="75" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{START}}</text>

  <!-- 箭头：开始 → 步骤1 -->
  <line x1="400" y1="90" x2="400" y2="120" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 步骤1 -->
  <rect x="300" y="120" width="200" height="50" rx="8"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="150" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" fill="{{TEXT_COLOR}}">{{STEP_1}}</text>

  <!-- 箭头：步骤1 → 判断 -->
  <line x1="400" y1="170" x2="400" y2="210" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 判断（菱形） -->
  <polygon points="400,210 480,250 400,290 320,250"
           fill="{{ACCENT2_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT2_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="255" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" fill="{{TEXT_COLOR}}">{{DECISION}}</text>

  <!-- 是 → 步骤2 -->
  <line x1="400" y1="290" x2="400" y2="330" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="315" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{ACCENT_COLOR}}">是</text>

  <!-- 否 → 步骤3（右侧） -->
  <line x1="480" y1="250" x2="600" y2="250" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="535" y="243" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{ACCENT3_COLOR}}">否</text>

  <!-- 步骤2 -->
  <rect x="300" y="330" width="200" height="50" rx="8"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="360" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" fill="{{TEXT_COLOR}}">{{STEP_2}}</text>

  <!-- 步骤3（右侧分支） -->
  <rect x="600" y="225" width="160" height="50" rx="8"
        fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="255" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" fill="{{TEXT_COLOR}}">{{STEP_3}}</text>

  <!-- 箭头：步骤2 → 结束 -->
  <line x1="400" y1="380" x2="400" y2="420" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 步骤3 → 结束（合流） -->
  <line x1="680" y1="275" x2="680" y2="440" stroke="{{ARROW_COLOR}}" stroke-width="1.5"/>
  <line x1="680" y1="440" x2="475" y2="440" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 结束节点 -->
  <rect x="325" y="420" width="150" height="40" rx="20"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.2" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="445" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{END}}</text>
</svg>
