<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    Split Content 模板
    用途: 左图右文——图示+解读并排，最常见的内容页布局
    适用场景: 产品特性说明、方案解读、数据洞察配图、案例展示
    布局: 左640px图示区 + 右640px文字区，顶部标签栏，中间竖线分隔
    -->

    <defs>
        <!-- 背景渐变 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#EEF1F5;stop-opacity:1" />
        </linearGradient>

        <!-- 卡片阴影 -->
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.12"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- 左侧图示区蓝色渐变 -->
        <linearGradient id="visualAreaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
        </linearGradient>

        <!-- 左侧图示区强调渐变（图形填充） -->
        <linearGradient id="shapeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
        </linearGradient>

        <!-- 数据亮点渐变 -->
        <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="url(#bgGrad)"/>

    <!-- 顶部标签栏 -->
    <rect x="0" y="0" width="1280" height="56" fill="#FFFFFF" fill-opacity="0.8"/>
    <line x1="0" y1="56" x2="1280" y2="56" stroke="#E8EAED" stroke-width="1"/>

    <!-- 标签栏内容 -->
    <rect x="40" y="16" width="100" height="24" rx="12" fill="#2196F3" fill-opacity="0.1"/>
    <text x="90" y="32" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#2196F3" letter-spacing="0.5">
        <tspan>SECTION 01</tspan>
    </text>

    <text x="160" y="33"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#9AA0A6">
        <tspan>产品洞察 / Product Insight</tspan>
    </text>

    <!-- 页码右侧 -->
    <text x="1240" y="33" text-anchor="end"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" fill="#BDC3C7">
        <tspan>05</tspan>
    </text>

    <!-- ======================== 左侧图示区 ======================== -->
    <g filter="url(#cardShadow)">
        <rect x="40" y="76" width="580" height="600" rx="14" fill="url(#visualAreaGrad)"/>
    </g>

    <!-- 图示区内部 - 主图形（中央占位示意） -->
    <!-- 中央大圆形占位 -->
    <circle cx="330" cy="320" r="140" fill="#FFFFFF" fill-opacity="0.6"/>
    <circle cx="330" cy="320" r="110" fill="url(#shapeGrad)" fill-opacity="0.15"/>

    <!-- 圆形内中心图标线框（简化示意） -->
    <rect x="295" y="285" width="70" height="70" rx="8" fill="#2196F3" fill-opacity="0.2" stroke="#2196F3" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="315" y1="295" x2="345" y2="345" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
    <line x1="345" y1="295" x2="315" y2="345" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
    <text x="330" y="375" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#1565C0" fill-opacity="0.7">
        <tspan>图片 / 图示区域</tspan>
    </text>

    <!-- 左侧图示区 - 三个围绕圆的小指标卡 -->
    <!-- 左侧小卡 -->
    <rect x="68" y="260" width="130" height="60" rx="10" fill="#FFFFFF" fill-opacity="0.85" filter="url(#cardShadow)"/>
    <rect x="68" y="260" width="4" height="60" rx="2" fill="#2196F3"/>
    <text x="85" y="282"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="11" fill="#9AA0A6">
        <tspan>用户满意度</tspan>
    </text>
    <text x="85" y="306"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#1A252F">
        <tspan>92%</tspan>
    </text>

    <!-- 右侧小卡 -->
    <rect x="462" y="260" width="130" height="60" rx="10" fill="#FFFFFF" fill-opacity="0.85" filter="url(#cardShadow)"/>
    <rect x="462" y="260" width="4" height="60" rx="2" fill="#4CAF50"/>
    <text x="479" y="282"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="11" fill="#9AA0A6">
        <tspan>月增长率</tspan>
    </text>
    <text x="479" y="306"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#1A252F">
        <tspan>+23%</tspan>
    </text>

    <!-- 下方小卡 -->
    <rect x="255" y="475" width="150" height="60" rx="10" fill="#FFFFFF" fill-opacity="0.85" filter="url(#cardShadow)"/>
    <rect x="255" y="475" width="4" height="60" rx="2" fill="#FF9800"/>
    <text x="272" y="497"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="11" fill="#9AA0A6">
        <tspan>活跃用户数</tspan>
    </text>
    <text x="272" y="521"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#1A252F">
        <tspan>128.3万</tspan>
    </text>

    <!-- 图示区标签 -->
    <text x="330" y="626" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="13" fill="#5F6368">
        <tspan>图1：核心业务表现概览（2025年Q4）</tspan>
    </text>

    <!-- ======================== 中间竖线分隔 ======================== -->
    <line x1="640" y1="76" x2="640" y2="676" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="6,4"/>

    <!-- ======================== 右侧文字区 ======================== -->

    <!-- 右侧主标题 -->
    <text x="680" y="135"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="32" font-weight="700" fill="#1A252F" letter-spacing="-0.5">
        <tspan>用户体验驱动</tspan>
    </text>
    <text x="680" y="172"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="32" font-weight="700" fill="#2196F3" letter-spacing="-0.5">
        <tspan>持续增长飞轮</tspan>
    </text>

    <!-- 标题下描述 -->
    <text x="680" y="205"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="15" fill="#7F8C8D">
        <tspan>以用户价值为核心，构建可持续的业务增长模型</tspan>
    </text>

    <line x1="680" y1="225" x2="1200" y2="225" stroke="#E8EAED" stroke-width="1"/>

    <!-- 要点列表 -->
    <!-- 要点 1 -->
    <circle cx="694" cy="268" r="7" fill="#2196F3"/>
    <text x="716" y="265"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="18" font-weight="600" fill="#1A252F">
        <tspan>深度理解用户核心需求</tspan>
    </text>
    <text x="716" y="288"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#7F8C8D">
        <tspan>通过行为数据分析和用户访谈，精准识别高价值需求点</tspan>
    </text>

    <!-- 要点 2 -->
    <circle cx="694" cy="345" r="7" fill="#4CAF50"/>
    <text x="716" y="342"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="18" font-weight="600" fill="#1A252F">
        <tspan>快速迭代产品体验</tspan>
    </text>
    <text x="716" y="365"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#7F8C8D">
        <tspan>双周迭代节奏，基于数据驱动产品优化决策</tspan>
    </text>

    <!-- 要点 3 -->
    <circle cx="694" cy="422" r="7" fill="#FF9800"/>
    <text x="716" y="419"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="18" font-weight="600" fill="#1A252F">
        <tspan>建立口碑传播机制</tspan>
    </text>
    <text x="716" y="442"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#7F8C8D">
        <tspan>NPS 82分，用户自发推荐占新增来源38%</tspan>
    </text>

    <!-- 要点 4 -->
    <circle cx="694" cy="499" r="7" fill="#9C27B0"/>
    <text x="716" y="496"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="18" font-weight="600" fill="#1A252F">
        <tspan>构建用户成功体系</tspan>
    </text>
    <text x="716" y="519"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#7F8C8D">
        <tspan>专属 CSM 团队，续约率提升至 94%</tspan>
    </text>

    <!-- 底部数据亮点 CTA 条 -->
    <rect x="680" y="570" width="540" height="76" rx="12" fill="url(#highlightGrad)" filter="url(#cardShadow)"/>
    <text x="710" y="601"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="14" fill="#FFFFFF" fill-opacity="0.85">
        <tspan>核心结论</tspan>
    </text>
    <text x="710" y="626"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="16" font-weight="700" fill="#FFFFFF">
        <tspan>用户体验每提升10分，次月留存率平均提高4.2个百分点</tspan>
    </text>

    <!-- 底部数据来源 -->
    <text x="1240" y="700" text-anchor="end"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" fill="#9AA0A6">
        <tspan>数据来源：产品分析平台 · 2025Q4</tspan>
    </text>
</svg>
