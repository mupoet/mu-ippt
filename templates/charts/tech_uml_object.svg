<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    UML 对象图模板
    展示实例对象+属性值+链接关系
    占位符同类图
  -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-link" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- 对象1: order:Order -->
  <rect x="60" y="70" width="220" height="110" rx="4"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="95" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_1}}</text>
  <line x1="60" y1="105" x2="280" y2="105" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="75" y="125" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">orderId = "ORD-001"</text>
  <text x="75" y="143" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">date = "2026-04-17"</text>
  <text x="75" y="161" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">status = "confirmed"</text>

  <!-- 对象2: customer:Customer -->
  <rect x="340" y="70" width="220" height="95" rx="4"
        fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="95" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_2}}</text>
  <line x1="340" y1="105" x2="560" y2="105" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="355" y="125" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">name = "Alice"</text>
  <text x="355" y="143" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">email = "alice@test.com"</text>

  <!-- 对象3: item1:LineItem -->
  <rect x="100" y="250" width="220" height="95" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="275" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_3}}</text>
  <line x1="100" y1="285" x2="320" y2="285" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="115" y="305" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">quantity = 2</text>
  <text x="115" y="323" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">price = 29.90</text>

  <!-- 对象4: item2:LineItem -->
  <rect x="400" y="250" width="220" height="95" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="510" y="275" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_4}}</text>
  <line x1="400" y1="285" x2="620" y2="285" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="415" y="305" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">quantity = 1</text>
  <text x="415" y="323" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">price = 59.00</text>

  <!-- 对象5: product:Product -->
  <rect x="620" y="250" width="220" height="95" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="275" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="14" font-weight="bold" fill="{{TEXT_COLOR}}" text-decoration="underline">{{OBJ_5}}</text>
  <line x1="620" y1="285" x2="840" y2="285" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="635" y="305" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">name = "Widget"</text>
  <text x="635" y="323" font-family="{{FONT_FAMILY}}" font-size="11" fill="{{TEXT_COLOR}}">sku = "WDG-100"</text>

  <!-- 链接关系 -->
  <!-- order → customer -->
  <line x1="280" y1="110" x2="338" y2="110" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <text x="310" y="102" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">placedBy</text>

  <!-- order → item1 -->
  <line x1="140" y1="180" x2="180" y2="248" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <text x="135" y="218" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">contains</text>

  <!-- order → item2 -->
  <line x1="220" y1="180" x2="460" y2="248" stroke="{{ARROW_COLOR}}" stroke-width="2"/>

  <!-- item2 → product -->
  <line x1="620" y1="290" x2="622" y2="290" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <line x1="510" y1="345" x2="700" y2="345" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        marker-end="url(#arrow-link)"/>
  <text x="605" y="338" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">product</text>

  <!-- 图例 -->
  <rect x="650" y="400" width="230" height="85" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="665" y="420" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TITLE_COLOR}}">图例 Legend</text>
  <text x="665" y="440" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}" text-decoration="underline">objectName:Class</text>
  <text x="780" y="440" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{SUBTITLE_COLOR}}">对象实例</text>
  <line x1="665" y1="458" x2="720" y2="458" stroke="{{ARROW_COLOR}}" stroke-width="2"/>
  <text x="730" y="462" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">链接 Link</text>
  <line x1="665" y1="476" x2="720" y2="476" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        marker-end="url(#arrow-link)"/>
  <text x="730" y="480" font-family="{{FONT_FAMILY}}" font-size="10" fill="{{TEXT_COLOR}}">导航 Navigation</text>
</svg>
