<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!--
    Multi-Agent 协作模板
    三区域：Mission Control / Specialist Agents / Synthesis
    含 Coordinator、Research Agent、Coding Agent、Review Agent、Shared Memory、Synthesis Engine
    占位符说明：
      {{BG_COLOR}} {{TEXT_COLOR}} {{TITLE_COLOR}} {{SUBTITLE_COLOR}}
      {{ACCENT_COLOR}} {{ACCENT2_COLOR}} {{ACCENT3_COLOR}} {{BORDER_COLOR}}
      {{NODE_FILL}} {{NODE_STROKE}} {{ARROW_COLOR}} {{FONT_FAMILY}}

    语义形状：Agent=六边形，LLM=双边框圆角矩形⚡，短期记忆=虚线边框，
    长期记忆=实线圆柱体，工具=带⚙的矩形，消息队列=横向管道
    LLM 生成时参考此结构，自由增减 Agent 节点。
  -->

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ARROW_COLOR}}"/>
    </marker>
    <marker id="arrow-async" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ACCENT2_COLOR}}"/>
    </marker>
    <marker id="arrow-ctrl" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="{{ACCENT3_COLOR}}"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="{{BG_COLOR}}" rx="6"/>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="20" font-weight="bold" fill="{{TITLE_COLOR}}">{{TITLE}}</text>

  <!-- ====== 区域 1: Mission Control ====== -->
  <rect x="20" y="48" width="230" height="400" rx="10"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.04" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="135" y="70" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{ACCENT_COLOR}}">{{ZONE_1}}</text>

  <!-- 用户（圆形 + 身体路径） -->
  <circle cx="135" cy="110" r="18" fill="{{ACCENT_COLOR}}" fill-opacity="0.15"
          stroke="{{ACCENT_COLOR}}" stroke-width="2"/>
  <circle cx="135" cy="103" r="6" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <path d="M 123 119 Q 135 130 147 119" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="135" y="143" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{SUBTITLE_COLOR}}">{{USER_LABEL}}</text>

  <!-- Coordinator（六边形 = Agent/编排器） -->
  <polygon points="90,185 180,185 210,215 180,245 90,245 60,215"
           fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="135" y="210" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">{{COORDINATOR}}</text>
  <text x="135" y="228" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{COORDINATOR_DESC}}</text>

  <!-- User → Coordinator -->
  <line x1="135" y1="130" x2="135" y2="183" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Task Queue（横向管道 = 消息队列） -->
  <rect x="55" y="280" width="160" height="30" rx="15"
        fill="{{ACCENT2_COLOR}}" fill-opacity="0.12" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="135" y="300" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{TASK_QUEUE}}</text>

  <!-- Coordinator → Task Queue -->
  <line x1="135" y1="245" x2="135" y2="278" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Status Dashboard -->
  <rect x="55" y="340" width="160" height="40" rx="6"
        fill="{{NODE_FILL}}" stroke="{{BORDER_COLOR}}" stroke-width="1.5"/>
  <text x="135" y="365" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{STATUS_BOARD}}</text>

  <!-- ====== 区域 2: Specialist Agents ====== -->
  <rect x="270" y="48" width="350" height="400" rx="10"
        fill="{{ACCENT2_COLOR}}" fill-opacity="0.04" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"/>
  <text x="445" y="70" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{ACCENT2_COLOR}}">{{ZONE_2}}</text>

  <!-- Research Agent（六边形） -->
  <polygon points="305,95 385,95 410,120 385,145 305,145 280,120"
           fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="116" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{AGENT_1}}</text>
  <text x="345" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{SUBTITLE_COLOR}}">{{AGENT_1_DESC}}</text>

  <!-- Coding Agent（六边形） -->
  <polygon points="440,95 520,95 545,120 520,145 440,145 415,120"
           fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="116" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{AGENT_2}}</text>
  <text x="480" y="133" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{SUBTITLE_COLOR}}">{{AGENT_2_DESC}}</text>

  <!-- Review Agent（六边形） -->
  <polygon points="370,170 450,170 475,195 450,220 370,220 345,195"
           fill="{{NODE_FILL}}" stroke="{{ACCENT3_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="191" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{AGENT_3}}</text>
  <text x="410" y="208" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="8" fill="{{SUBTITLE_COLOR}}">{{AGENT_3_DESC}}</text>

  <!-- Agent 4: 额外 Agent 槽 -->
  <polygon points="305,245 385,245 410,270 385,295 305,295 280,270"
           fill="{{NODE_FILL}}" stroke="{{BORDER_COLOR}}" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="345" y="274" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" fill="{{SUBTITLE_COLOR}}">{{AGENT_4}}</text>

  <!-- Shared Memory（实线圆柱体 = 长期记忆） -->
  <ellipse cx="445" cy="310" rx="55" ry="12" fill="{{ACCENT_COLOR}}" fill-opacity="0.15"
           stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <rect x="390" y="310" width="110" height="45" fill="{{NODE_FILL}}"
        stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <ellipse cx="445" cy="355" rx="55" ry="12" fill="{{NODE_FILL}}"
           stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <text x="445" y="335" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{SHARED_MEMORY}}</text>
  <text x="445" y="350" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{SHARED_MEMORY_DESC}}</text>

  <!-- Agent → Shared Memory（记忆写入虚线） -->
  <line x1="345" y1="145" x2="420" y2="298" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow-async)"/>
  <line x1="480" y1="145" x2="460" y2="298" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow-async)"/>
  <line x1="410" y1="220" x2="440" y2="298" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow-async)"/>

  <!-- Coordinator → Agents（控制/触发） -->
  <line x1="210" y1="200" x2="278" y2="120" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" marker-end="url(#arrow-ctrl)"/>
  <line x1="210" y1="210" x2="413" y2="120" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" marker-end="url(#arrow-ctrl)"/>
  <line x1="210" y1="220" x2="343" y2="195" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" marker-end="url(#arrow-ctrl)"/>
  <text x="260" y="155" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{ACCENT3_COLOR}}">dispatch</text>

  <!-- Inter-agent communication (异步虚线) -->
  <line x1="385" y1="130" x2="415" y2="130" stroke="{{ACCENT2_COLOR}}" stroke-width="1"
        stroke-dasharray="4,2"/>
  <line x1="410" y1="170" x2="380" y2="145" stroke="{{ACCENT2_COLOR}}" stroke-width="1"
        stroke-dasharray="4,2"/>

  <!-- ====== 区域 3: Synthesis ====== -->
  <rect x="640" y="48" width="240" height="400" rx="10"
        fill="{{ACCENT3_COLOR}}" fill-opacity="0.04" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5"/>
  <text x="760" y="70" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{ACCENT3_COLOR}}">{{ZONE_3}}</text>

  <!-- Synthesis Engine（双边框 LLM ⚡） -->
  <rect x="680" y="100" width="160" height="70" rx="12"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="685" y="105" width="150" height="60" rx="9"
        fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1" stroke-opacity="0.5"/>
  <text x="760" y="130" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="13" font-weight="bold" fill="{{TEXT_COLOR}}">⚡ {{SYNTHESIS}}</text>
  <text x="760" y="150" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="9" fill="{{SUBTITLE_COLOR}}">{{SYNTHESIS_DESC}}</text>

  <!-- Agents → Synthesis -->
  <line x1="545" y1="120" x2="678" y2="130" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Quality Gate（菱形 = 决策） -->
  <polygon points="760,210 810,240 760,270 710,240"
           fill="{{ACCENT3_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT3_COLOR}}" stroke-width="2"/>
  <text x="760" y="244" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="10" fill="{{TEXT_COLOR}}">{{QUALITY_GATE}}</text>

  <line x1="760" y1="170" x2="760" y2="208" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pass → Output -->
  <rect x="700" y="310" width="120" height="44" rx="20"
        fill="{{ACCENT_COLOR}}" fill-opacity="0.15" stroke="{{ACCENT_COLOR}}" stroke-width="2" filter="url(#shadow)"/>
  <text x="760" y="337" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="12" font-weight="bold" fill="{{TEXT_COLOR}}">{{OUTPUT}}</text>

  <line x1="760" y1="270" x2="760" y2="308" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="773" y="293" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT_COLOR}}">pass</text>

  <!-- Fail → Loop back（反馈曲线） -->
  <path d="M 710 240 Q 660 240 620 195 Q 580 150 545 130" fill="none"
        stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" marker-end="url(#arrow-ctrl)"/>
  <text x="645" y="195" font-family="{{FONT_FAMILY}}" font-size="9" fill="{{ACCENT3_COLOR}}">retry</text>

  <!-- Output Report -->
  <polygon points="690,380 810,380 820,390 820,430 690,430"
           fill="{{NODE_FILL}}" stroke="{{NODE_STROKE}}" stroke-width="1.5"/>
  <polygon points="810,380 810,390 820,390" fill="{{BORDER_COLOR}}" fill-opacity="0.3"
           stroke="{{NODE_STROKE}}" stroke-width="1"/>
  <text x="755" y="410" text-anchor="middle" font-family="{{FONT_FAMILY}}"
        font-size="11" font-weight="bold" fill="{{TEXT_COLOR}}">{{REPORT}}</text>

  <line x1="760" y1="354" x2="760" y2="378" stroke="{{ARROW_COLOR}}" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== 图例 ====== -->
  <rect x="20" y="458" width="550" height="32" rx="6"
        fill="{{BG_COLOR}}" stroke="{{BORDER_COLOR}}" stroke-width="1"/>
  <text x="35" y="478" font-family="{{FONT_FAMILY}}"
        font-size="9" font-weight="bold" fill="{{TITLE_COLOR}}">图例:</text>

  <polygon points="65,475 77,475 83,479 77,483 65,483 59,479"
           fill="{{NODE_FILL}}" stroke="{{ACCENT2_COLOR}}" stroke-width="1"/>
  <text x="93" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">Agent</text>

  <rect x="118" y="472" width="18" height="12" rx="4"
        fill="{{NODE_FILL}}" stroke="{{ACCENT_COLOR}}" stroke-width="1.5"/>
  <rect x="120" y="474" width="14" height="8" rx="3" fill="none"
        stroke="{{ACCENT_COLOR}}" stroke-width="0.5"/>
  <text x="144" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">⚡ LLM</text>

  <ellipse cx="190" cy="476" rx="12" ry="4" fill="none" stroke="{{ACCENT_COLOR}}" stroke-width="1"/>
  <text x="208" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">记忆</text>

  <line x1="240" y1="478" x2="260" y2="478" stroke="{{ACCENT3_COLOR}}" stroke-width="1.5" marker-end="url(#arrow-ctrl)"/>
  <text x="268" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">控制</text>

  <line x1="298" y1="478" x2="318" y2="478" stroke="{{ACCENT2_COLOR}}" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arrow-async)"/>
  <text x="326" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">写入</text>

  <line x1="358" y1="478" x2="378" y2="478" stroke="{{ARROW_COLOR}}" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="386" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">数据流</text>

  <polygon points="425,478 435,472 445,478 435,484"
           fill="{{ACCENT3_COLOR}}" fill-opacity="0.3" stroke="{{ACCENT3_COLOR}}" stroke-width="1"/>
  <text x="453" y="482" font-family="{{FONT_FAMILY}}" font-size="8" fill="{{TEXT_COLOR}}">质量门控</text>
</svg>
